spring:
  application:
    name: orderiq
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: ${OPENAI_MODEL:gpt-5.4-nano}
  config:
    import: classpath:order-vocabulary.yaml
  sql:
    init:
      mode: always
  jackson:
    property-naming-strategy: SNAKE_CASE

orderiq:
  database:
    path: ${ORDERIQ_DB_PATH:./data/orders.db}
